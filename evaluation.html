<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puer Management | Peer Evaluation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      :root {
        --puer-gradient: linear-gradient(135deg, #ff9102 0%, #ff6b00 100%);
      }
      body {
        background-color: #f8f9fa;
        font-family: "Segoe UI", sans-serif;
      }
      .dashboard-page .navbar {
        background: var(--puer-gradient) !important;
        border-bottom: none;
      }
      .eval-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      .member-select-card {
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }
      .member-select-card:hover {
        transform: translateY(-5px);
        border-color: #ff9102;
      }
      .member-select-card.active {
        border-color: #ff9102;
        background-color: #fff9f2;
      }

      /* Aktif Yıldızlar */
      .star-rating {
        font-size: 1.8rem;
        color: #ddd;
        display: inline-block;
      }
      .star-rating i {
        cursor: pointer;
        transition: color 0.2s;
      }
      .star-rating i.active {
        color: #ff9102;
      }
      .btn-submit-eval {
        background: var(--puer-gradient);
        border: none;
        padding: 12px 30px;
        border-radius: 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body class="dashboard-page">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
      <div class="container-xl">
        <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
          <i class="bi bi-person-workspace me-2 fs-4"></i>
          <span class="fs-5 fw-bold">Puer Management</span>
        </a>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="projects.html">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="evaluation.html">Evaluation</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle bg-white bg-opacity-10 rounded-pill px-3"
                href="#"
                id="userDropdown"
                data-bs-toggle="dropdown"
              >
                <i class="bi bi-person-circle me-1"></i> Loading...
              </a>
              <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                <li>
                  <a class="dropdown-item" href="profile.html"
                    ><i class="bi bi-person me-2"></i>Profile</a
                  >
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item text-danger" href="login.html"
                    ><i class="bi bi-box-arrow-right me-2"></i>Logout</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container-xl my-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <h1 class="fw-bold mb-1">Peer Evaluation</h1>
          <p class="text-muted mb-4">
            Evaluate your teammates' contributions for Milestone 2
          </p>

          <h5 class="fw-bold mb-3">1. Select Teammate</h5>
          <div class="row g-3 mb-5">
            <div class="col-md-4">
              <div
                class="card member-select-card p-3 text-center h-100 shadow-sm"
                onclick="selectMember(this, 'Umut İleri')"
              >
                <img
                  src="images/avatar.png"
                  class="rounded-circle mx-auto mb-3"
                  width="60"
                  height="60"
                />
                <h6 class="fw-bold mb-0">Umut İleri</h6>
                <small class="text-muted">Frontend Dev</small>
              </div>
            </div>
            <div class="col-md-4">
              <div
                class="card member-select-card p-3 text-center h-100 shadow-sm"
                onclick="selectMember(this, 'Doruk Alp')"
              >
                <img
                  src="images/avatar.png"
                  class="rounded-circle mx-auto mb-3"
                  width="60"
                  height="60"
                />
                <h6 class="fw-bold mb-0">Doruk Alp</h6>
                <small class="text-muted">Backend Dev</small>
              </div>
            </div>
            <div class="col-md-4">
              <div
                class="card member-select-card p-3 text-center h-100 shadow-sm"
                onclick="selectMember(this, 'İrem Cürül')"
              >
                <img
                  src="images/avatar.png"
                  class="rounded-circle mx-auto mb-3"
                  width="60"
                  height="60"
                />
                <h6 class="fw-bold mb-0">İrem Cürül</h6>
                <small class="text-muted">Documenter</small>
              </div>
            </div>
          </div>

          <div class="card eval-card p-4 p-md-5 mb-5">
            <h5 class="fw-bold mb-4">2. Performance Metrics</h5>
            <form id="evaluationForm">
              <div class="row g-4">
                <div class="col-md-6 text-center text-md-start">
                  <label class="form-label fw-bold"
                    >Technical Contribution</label
                  >
                  <div class="star-rating d-block" data-metric="tech">
                    <i class="bi bi-star-fill" data-value="1"></i>
                    <i class="bi bi-star-fill" data-value="2"></i>
                    <i class="bi bi-star-fill" data-value="3"></i>
                    <i class="bi bi-star-fill" data-value="4"></i>
                    <i class="bi bi-star-fill" data-value="5"></i>
                  </div>
                </div>
                <div class="col-md-6 text-center text-md-start">
                  <label class="form-label fw-bold">Communication</label>
                  <div class="star-rating d-block" data-metric="comm">
                    <i class="bi bi-star-fill" data-value="1"></i>
                    <i class="bi bi-star-fill" data-value="2"></i>
                    <i class="bi bi-star-fill" data-value="3"></i>
                    <i class="bi bi-star-fill" data-value="4"></i>
                    <i class="bi bi-star-fill" data-value="5"></i>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label fw-bold">Specific Feedback</label>
                  <textarea
                    class="form-control"
                    rows="4"
                    placeholder="Their impact on this milestone..."
                  ></textarea>
                </div>
                <div class="col-12 text-end mt-4">
                  <button
                    type="submit"
                    class="btn btn-primary btn-submit-eval text-white shadow"
                  >
                    Submit Evaluation
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const savedName =
          localStorage.getItem("puer_user_name") || "Boran Köseoğlu";
        if (document.getElementById("userDropdown")) {
          document.getElementById(
            "userDropdown"
          ).innerHTML = `<i class="bi bi-person-circle me-1"></i> ${savedName}`;
        }
        document.querySelectorAll(".star-rating i").forEach((star) => {
          star.addEventListener("click", function () {
            const val = this.getAttribute("data-value");
            const container = this.parentElement;
            container.querySelectorAll("i").forEach((s) => {
              s.classList.toggle("active", s.getAttribute("data-value") <= val);
            });
          });
        });
      });

      function selectMember(element, name) {
        document
          .querySelectorAll(".member-select-card")
          .forEach((card) => card.classList.remove("active"));
        element.classList.add("active");
      }

      document
        .getElementById("evaluationForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const btn = document.querySelector(".btn-submit-eval");
          btn.disabled = true;
          btn.innerHTML =
            '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';
          setTimeout(() => {
            alert("Evaluation submitted! Fairness score updated.");
            window.location.href = "dashboard.html";
          }, 1200);
        });
    </script>
  </body>
</html>
